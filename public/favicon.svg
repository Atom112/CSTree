<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 28 28" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Root -->
  <circle cx="14" cy="22" r="2.5" fill="#2563eb"/>
  <!-- Level 1→2 -->
  <line x1="14" y1="19.5" x2="8" y2="14" stroke="#2563eb"/>
  <line x1="14" y1="19.5" x2="20" y2="14" stroke="#2563eb"/>
  <!-- Level 2 -->
  <circle cx="8" cy="14" r="2.5" fill="#2563eb"/>
  <circle cx="20" cy="14" r="2.5" fill="#2563eb"/>
  <!-- Level 2 cross -->
  <line x1="10.5" y1="14" x2="17.5" y2="14" stroke="#2563eb" stroke-dasharray="2 2" opacity="0.5"/>
  <!-- Level 2→3 -->
  <line x1="8" y1="11.5" x2="5" y2="6" stroke="#2563eb"/>
  <line x1="8" y1="11.5" x2="12" y2="6" stroke="#2563eb"/>
  <line x1="20" y1="11.5" x2="16" y2="6" stroke="#2563eb"/>
  <line x1="20" y1="11.5" x2="23" y2="6" stroke="#2563eb"/>
  <!-- Level 3 -->
  <circle cx="5" cy="6" r="2.5" fill="#2563eb"/>
  <circle cx="12" cy="6" r="2.5" fill="#2563eb"/>
  <circle cx="16" cy="6" r="2.5" fill="#2563eb"/>
  <circle cx="23" cy="6" r="2.5" fill="#2563eb"/>
  <!-- cross -->
  <line x1="12" y1="8.5" x2="16" y2="8.5" stroke="#2563eb" stroke-dasharray="2 2" opacity="0.4"/>
</svg>
